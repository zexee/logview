name: build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Boost + GUI deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-regex-dev \
            libgl1-mesa-dev libglu1-mesa-dev mesa-common-dev \
            xorg

      - name: Configure (TUI)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build TUI
        run: cmake --build build -j

      - name: Run filter tests
        run: ./build/test_filter_engine

      - name: Run line editor tests
        run: ./build/test_line_editor

      - name: Perf smoke
        run: ./build/perf_filter_engine test_log.txt tests/perf_rules.txt

      - name: Fetch GUI third-party sources
        run: ./scripts/bootstrap_third_party.sh

      - name: Configure GUI
        run: cmake -B build_gui -DCMAKE_BUILD_TYPE=Release -DLV_BUILD_GUI=ON

      - name: Build GUI
        run: cmake --build build_gui -j --target lv-gui

      - name: GUI binary exists
        run: test -x build_gui/lv-gui

      - name: Upload lv-gui binary
        uses: actions/upload-artifact@v4
        with:
          name: lv-gui-linux
          path: build_gui/lv-gui

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install boost-regex
        run: vcpkg install boost-regex:x64-windows

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build -j --config Release

      - name: Run filter tests
        run: .\build\Release\test_filter_engine.exe

      - name: Run line editor tests
        run: .\build\Release\test_line_editor.exe
